paragraph=Clean-room, calibration-first Arduino library for TI FDC1004, FDC1004-Q1, FDC2112, FDC2114, FDC2212 and FDC2214 capacitive sensing. Provides FDC1004 direct capacitance readout, CAPDAC calibration, baseline tracking, diagnostics, temperature compensation, FDC2x1x frequency-first sensing, model-dependent derived capacitance, metadata-aware experimental profiles for liquid level, proximity, material and surface-state sensing, and claim-safe documentation.
