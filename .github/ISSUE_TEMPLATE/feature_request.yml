name: Feature request
description: Suggest a feature or documentation improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: family
    attributes:
      label: Device family
      options:
        - FDC1004
        - FDC2x1x
        - Shared/core
        - Documentation only
